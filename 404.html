<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="icon" href="assets/moon.png">
    <title>404 | Lost in Orbit</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'drift': 'drift 20s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(5deg)' },
                        },
                        drift: {
                            '0%': { backgroundPosition: '0% 0%' },
                            '100%': { backgroundPosition: '100% 100%' },
                        }
                    }
                }
            }
        }
    </script>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('stellaris-theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            const savedDir = localStorage.getItem('stellaris-dir') || 'ltr';
            document.documentElement.setAttribute('dir', savedDir);
        })();
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-500 overflow-hidden">

    <nav class="fixed top-0 w-full z-50 p-6 flex justify-end items-center gap-4">
        <button id="dir-toggle" class="px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-lg text-xs font-black hover:border-indigo-500 transition-all active:scale-95">
            LTR
        </button>
        <button id="theme-toggle" class="p-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-lg hover:border-indigo-500 transition-all active:scale-95 text-indigo-600 dark:text-amber-400">
            <i id="theme-icon" class="fa-solid fa-circle-half-stroke"></i>
        </button>
    </nav>

    <main class="relative min-h-screen flex items-center justify-center p-6">
        <div class="absolute inset-0 z-0 opacity-30 dark:opacity-50 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] animate-drift"></div>

        <div class="relative z-10 text-center max-w-2xl">
            <a href="index.html" class="inline-block group mb-12">
                <div class="w-24 h-24 bg-indigo-600 dark:bg-indigo-500 rounded-[2rem] flex items-center justify-center shadow-2xl shadow-indigo-500/40 group-hover:scale-110 group-hover:rotate-12 transition-all duration-500">
                    <i class="fa-solid fa-shuttle-space text-white text-5xl"></i>
                </div>
            </a>

            <h1 class="text-[12rem] md:text-[15rem] font-black leading-none tracking-tighter text-indigo-600/10 dark:text-white/5 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none select-none">
                404
            </h1>

            <div class="relative animate-float">
                <i class="fa-solid fa-user-astronaut text-7xl md:text-9xl text-indigo-600 dark:text-indigo-400 mb-8 drop-shadow-2xl"></i>
            </div>

            <h2 class="text-3xl md:text-5xl font-black mb-6 tracking-tight">
                Houston, we have a <span class="text-indigo-600">problem.</span>
            </h2>
            
            <p class="text-lg text-slate-500 dark:text-slate-400 mb-12 max-w-md mx-auto leading-relaxed">
                The coordinates you entered seem to lead to a black hole. Let's get you back to the safety of our home station.
            </p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="index.html" class="w-full sm:w-auto px-10 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-xl shadow-indigo-600/20 transition-all active:scale-95 flex items-center gap-2">
                    <i class="fa-solid fa-house-astronomy"></i> Back to Station
                </a>
                <button onclick="window.history.back()" class="w-full sm:w-auto px-10 py-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 font-bold rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-all active:scale-95">
                    Previous Orbit
                </button>
            </div>
        </div>
    </main>
    <script>
    const root = document.documentElement;

    // --- 1. THEME LOGIC ---
    const updateTheme = (isDark) => {
        root.classList.toggle('dark', isDark);
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        
        // Update the icon if it exists
        const themeIcon = document.getElementById('theme-icon');
        const themeIconM = document.getElementById('theme-icon-m');
        if (themeIcon) themeIcon.className = isDark ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
        if (themeIconM) themeIconM.className = isDark ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
    };

    // Initialize Theme from LocalStorage or System Preference
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        updateTheme(true);
    } else {
        updateTheme(false);
    }

    // Attach Theme Toggle to all buttons (Desktop & Mobile)
    document.querySelectorAll('#theme-toggle, #theme-toggle-m').forEach(btn => {
        btn.onclick = () => updateTheme(!root.classList.contains('dark'));
    });

    // --- 2. DIRECTION LOGIC (LTR/RTL) ---
    const updateDirection = (dir) => {
        root.dir = dir;
        root.setAttribute('dir', dir); // Extra safety for some CSS selectors
        localStorage.setItem('dir', dir);
        
        document.querySelectorAll('#dir-toggle, #dir-toggle-m').forEach(btn => {
            // Update button text/icon based on current direction
            btn.innerHTML = dir === 'rtl' 
                ? '<i class="fa-solid fa-language"></i> RTL' 
                : '<i class="fa-solid fa-language"></i> LTR';
        });
    };

    // Initialize Direction
    const savedDir = localStorage.getItem('dir') || 'ltr';
    updateDirection(savedDir);

    // Attach Direction Toggle to all buttons
    document.querySelectorAll('#dir-toggle, #dir-toggle-m').forEach(btn => {
        btn.onclick = () => updateDirection(root.dir === 'rtl' ? 'ltr' : 'rtl');
    });

    // --- 3. FORM TOGGLE (Optional for 404 page) ---
    function toggle() {
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        if (loginForm && signupForm) {
            loginForm.classList.toggle('hidden');
            signupForm.classList.toggle('hidden');
        }
    }
</script>

</html>
