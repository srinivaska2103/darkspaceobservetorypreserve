<html lang="en" 
      x-data="setup()" 
      :class="{ 'dark': darkMode }" 
      :dir="isRtl ? 'rtl' : 'ltr'">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="icon" href="assets/moon.png">
    <title>Stellaris | Secure Access</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Critical: tells Tailwind to look for the 'dark' class
            theme: {
                extend: {
                    colors: {
                        indigo: { 950: '#0a0a23' }
                    }
                }
            }
        }
    </script>

    <script>
        (function() {
            // Theme Initialization
            const savedTheme = localStorage.getItem('stellaris-theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }

            // Direction Initialization
            const savedDir = localStorage.getItem('stellaris-dir') || 'ltr';
            document.documentElement.setAttribute('dir', savedDir);
        })();
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-500 min-h-screen">

    <nav class="fixed top-0 w-full z-50 p-6 flex justify-end items-center gap-4">
       <button id="dir-toggle" class="dir-toggle px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-lg text-xs font-black hover:border-indigo-500 transition-all active:scale-95 dark:text-white">
    LTR
</button>

<button id="theme-toggle" class="theme-toggle p-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-lg hover:border-indigo-500 transition-all active:scale-95 text-indigo-600 dark:text-amber-400">
    <i id="theme-icon" class="theme-icon fa-solid fa-moon text-xl"></i>
</button>
    </nav>

    <main class="flex items-center justify-center min-h-screen p-4">
        <div class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-2 bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100 dark:border-slate-800">
            
            <div class="hidden lg:flex relative bg-indigo-600 p-12 items-center justify-center text-center overflow-hidden">
                <div class="absolute inset-0 opacity-40">
                    <img src="https://images.unsplash.com/photo-1464802686167-b939a67a06d1?auto=format&fit=crop&w=1200" class="w-full h-full object-cover">
                </div>
                <a href="index.html" class="relative z-10 group">
                    <div class="w-20 h-20 bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl flex items-center justify-center mb-4 group-hover:scale-110 group-hover:bg-white group-hover:text-indigo-600 transition-all duration-500">
                        <i class="fa-solid fa-shuttle-space text-4xl"></i>
                    </div>
                    <h1 class="text-4xl font-black text-white tracking-widest uppercase">Stellaris</h1>
                    <p class="mt-4 text-indigo-100 max-w-xs mx-auto">Access the world's most advanced digital observatory.</p>
                </a>
            </div>

            <div class="p-8 md:p-16">
                <div id="login-form" class="space-y-6">
                    <h2 class="text-3xl font-black tracking-tight">Login</h2>
                    <form class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold mb-2">Email</label>
                            <input type="email" placeholder="name@stellaris.com" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                        </div>
                        <div>
                            <div class="flex justify-between mb-2">
                                <label class="text-sm font-bold">Password</label>
                                <a href="#" class="text-xs text-indigo-600 hover:underline">Forgot?</a>
                            </div>
                            <input type="password" placeholder="••••••••" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                        </div>
                        <button class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-xl shadow-indigo-600/20 transition-all active:scale-95">
                            Enter Observatory
                        </button>
                    </form>

                    <div class="pt-6 flex flex-col items-center gap-4">
                        <span class="text-[10px] uppercase font-black text-slate-400 tracking-[0.2em]">Or use social gateway</span>
                        <div class="flex gap-4">
                            <button class="w-12 h-12 rounded-xl border border-slate-200 dark:border-slate-700 flex items-center justify-center hover:bg-slate-50 dark:hover:bg-slate-800 transition-all"><i class="fa-brands fa-google"></i></button>
                            <button class="w-12 h-12 rounded-xl border border-slate-200 dark:border-slate-700 flex items-center justify-center hover:bg-slate-50 dark:hover:bg-slate-800 transition-all"><i class="fa-brands fa-apple text-xl"></i></button>
                        </div>
                    </div>

                    <p class="text-center text-sm pt-8 text-slate-500">
                        New explorer? <button onclick="toggle()" class="text-indigo-600 font-bold hover:underline">Create Account</button>
                    </p>
                </div>

                <div id="signup-form" class="hidden space-y-6">
                    <h2 class="text-3xl font-black tracking-tight">Register</h2>
                    <form class="space-y-4">
                        <input type="text" placeholder="Full Name" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                        <input type="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                        <input type="password" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                        <button class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-xl shadow-indigo-600/20 transition-all active:scale-95">
                            Join Mission
                        </button>
                    </form>
                    <p class="text-center text-sm pt-8 text-slate-500">
                        Member already? <button onclick="toggle()" class="text-indigo-600 font-bold hover:underline">Login</button>
                    </p>
                </div>
            </div>
        </div>
    </main>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const root = document.documentElement;

    // --- 1. THEME LOGIC ---
    const updateTheme = (isDark) => {
        root.classList.toggle('dark', isDark);
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        
        // Update all theme icons on the page
        const icons = document.querySelectorAll('.theme-icon, #theme-icon');
        icons.forEach(icon => {
            if (isDark) {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        });
    };

    // Initialize Theme
    const savedTheme = localStorage.getItem('theme');
    const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    updateTheme(savedTheme === 'dark' || (!savedTheme && systemDark));

    // Theme Click Listener
    document.addEventListener('click', (e) => {
        if (e.target.closest('.theme-toggle') || e.target.closest('#theme-toggle')) {
            updateTheme(!root.classList.contains('dark'));
        }
    });


    // --- 2. DIRECTION LOGIC (LTR/RTL) ---
    const updateDirection = (dir) => {
        root.setAttribute('dir', dir);
        localStorage.setItem('dir', dir);
        
        // Update all direction button text labels
        const dirBtns = document.querySelectorAll('.dir-toggle, #dir-toggle');
        dirBtns.forEach(btn => {
            btn.innerText = dir.toUpperCase();
        });
    };

    // Initialize Direction
    const savedDir = localStorage.getItem('dir') || 'ltr';
    updateDirection(savedDir);

    // Direction Click Listener
    document.addEventListener('click', (e) => {
        if (e.target.closest('.dir-toggle') || e.target.closest('#dir-toggle')) {
            const newDir = root.getAttribute('dir') === 'rtl' ? 'ltr' : 'rtl';
            updateDirection(newDir);
        }
    });
});
</script>
