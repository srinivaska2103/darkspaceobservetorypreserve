<!DOCTYPE html>
<html lang="en" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/moon.png">
    <title>Stellaris | Join the Mission</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { indigo: { 950: '#0a0a23' } }
                }
            }
        }
    </script>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            const savedDir = localStorage.getItem('dir') || 'ltr';
            document.documentElement.setAttribute('dir', savedDir);
        })();
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-500 min-h-screen">

    <nav class="fixed top-0 w-full z-50 p-6 flex justify-between items-center">
       <a href="index.html">
                 <div class="flex-shrink-0 flex items-center gap-2">
                <i class="fa-solid fa-moon text-indigo-500 text-2xl"></i>
                <span class="text-xl font-bold tracking-tighter">STELLARIS</span>
            </div>
            </a>

        <div class="flex items-center gap-3">
            <button id="dir-toggle" class="px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-lg text-xs font-black hover:border-indigo-500 transition-all active:scale-95">
                LTR
            </button>
            <button id="theme-toggle" class="p-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-lg hover:border-indigo-500 transition-all active:scale-95 text-indigo-600 dark:text-amber-400">
                <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
            </button>
        </div>
    </nav>

    <main class="flex items-center justify-center min-h-screen p-4 pt-24 lg:pt-4">
        <div class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-2 bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100 dark:border-slate-800">
            
            <div class="p-8 md:p-12 flex flex-col justify-center order-2 lg:order-1">
                <div class="space-y-6">
                    <div class="space-y-2 text-center lg:text-left">
                        <h2 class="text-3xl font-black tracking-tight">Register</h2>
                        <p class="text-slate-500 text-sm">Create your account to start exploring.</p>
                    </div>
                    
                    <form class="space-y-4" onsubmit="event.preventDefault()">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-bold mb-2">First Name</label>
                                <input type="text" placeholder="Astrid" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">Last Name</label>
                                <input type="text" placeholder="Orion" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-bold mb-2">Email Address</label>
                            <input type="email" placeholder="name@domain.com" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                        </div>

                        <div>
                            <label class="block text-sm font-bold mb-2">Password</label>
                            <input type="password" placeholder="••••••••" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                        </div>

                        <div class="flex items-center gap-3 py-2">
                            <input type="checkbox" id="terms" class="w-5 h-5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500">
                            <label for="terms" class="text-xs text-slate-500 font-medium">I agree to the <a href="#" class="text-indigo-600 hover:underline">Terms of Service</a></label>
                        </div>

                        <button class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-black uppercase tracking-widest text-xs rounded-2xl shadow-xl shadow-indigo-600/20 transition-all active:scale-95">
                            Create Account
                        </button>
                    </form>

                    <div class="pt-4 flex flex-col items-center gap-4">
                        <div class="flex items-center w-full gap-4">
                            <hr class="flex-1 border-slate-100 dark:border-slate-800">
                            <span class="text-[10px] uppercase font-black text-slate-400 tracking-[0.2em]">Social Gateway</span>
                            <hr class="flex-1 border-slate-100 dark:border-slate-800">
                        </div>
                        <div class="flex gap-4">
                            <button title="Join with Google" class="w-14 h-14 rounded-2xl border border-slate-200 dark:border-slate-800 flex items-center justify-center hover:bg-white dark:hover:bg-slate-800 hover:border-indigo-500 dark:hover:border-indigo-500 hover:text-indigo-600 transition-all shadow-sm">
                                <i class="fa-brands fa-google text-xl"></i>
                            </button>
                            <button title="Join with Apple" class="w-14 h-14 rounded-2xl border border-slate-200 dark:border-slate-800 flex items-center justify-center hover:bg-white dark:hover:bg-slate-800 hover:border-indigo-500 dark:hover:border-indigo-500 hover:text-indigo-600 transition-all shadow-sm">
                                <i class="fa-brands fa-apple text-2xl"></i>
                            </button>
                            <button title="Join with GitHub" class="w-14 h-14 rounded-2xl border border-slate-200 dark:border-slate-800 flex items-center justify-center hover:bg-white dark:hover:bg-slate-800 hover:border-indigo-500 dark:hover:border-indigo-500 hover:text-indigo-600 transition-all shadow-sm">
                                <i class="fa-brands fa-github text-2xl"></i>
                            </button>
                        </div>
                    </div>

                    <p class="text-center text-sm text-slate-500">
                        Member already? <a href="login.html" class="text-indigo-600 dark:text-indigo-400 font-bold hover:underline">Login here</a>
                    </p>
                </div>
            </div>

            <div class="hidden lg:flex relative bg-slate-900 p-12 items-center justify-center text-center overflow-hidden order-1 lg:order-2">
                <div class="absolute inset-0 opacity-50">
                    <img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1200" class="w-full h-full object-cover" alt="Galaxy">
                </div>
                <div class="relative z-10">
                    <div class="w-24 h-24 bg-white/10 backdrop-blur-xl border border-white/20 rounded-[2rem] flex items-center justify-center mb-8 mx-auto shadow-2xl">
                        <i class="fa-solid fa-user-astronaut text-white text-4xl animate-bounce"></i>
                    </div>
                    <h1 class="text-4xl font-black text-white tracking-widest uppercase leading-tight">Join the <br> Fleet</h1>
                    <p class="mt-6 text-slate-300 max-w-xs mx-auto leading-relaxed">Unlock high-resolution celestial mapping and remote telescope control.</p>
                </div>
                <div class="absolute -bottom-20 -right-20 w-64 h-64 bg-indigo-600/30 blur-[100px] rounded-full"></div>
            </div>

        </div>
    </main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const root = document.documentElement;

        const updateTheme = (isDark) => {
            root.classList.toggle('dark', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const icon = document.getElementById('theme-icon');
            if (isDark) icon.classList.replace('fa-moon', 'fa-sun');
            else icon.classList.replace('fa-sun', 'fa-moon');
        };

        const savedTheme = localStorage.getItem('theme');
        updateTheme(savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches));
        document.getElementById('theme-toggle').onclick = () => updateTheme(!root.classList.contains('dark'));

        const updateDirection = (dir) => {
            root.setAttribute('dir', dir);
            localStorage.setItem('dir', dir);
            document.getElementById('dir-toggle').innerText = dir.toUpperCase();
        };

        updateDirection(localStorage.getItem('dir') || 'ltr');
        document.getElementById('dir-toggle').onclick = () => {
            updateDirection(root.getAttribute('dir') === 'rtl' ? 'ltr' : 'rtl');
        };
    });
</script>
</body>
</html>
