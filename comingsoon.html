<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="icon" href="assets/moon.png">
    <title>Stellaris | Launching Soon</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 12s linear infinite',
                    }
                }
            }
        }
    </script>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            const savedDir = localStorage.getItem('dir') || 'ltr';
            document.documentElement.setAttribute('dir', savedDir);
        })();
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-500 min-h-screen flex flex-col">

    <nav class="fixed top-0 w-full z-50 p-6 flex justify-end items-center gap-4">
        <button id="dir-toggle" class="px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-lg text-xs font-black hover:border-indigo-500 transition-all active:scale-95">
            LTR
        </button>
        <button id="theme-toggle" class="p-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-lg hover:border-indigo-50 transition-all active:scale-95 text-indigo-600 dark:text-amber-400">
            <i id="theme-icon" class="fa-solid fa-sun"></i>
        </button>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
        <div class="absolute top-1/4 -left-20 w-96 h-96 bg-indigo-500/10 blur-[120px] rounded-full animate-pulse-slow"></div>
        <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-purple-500/10 blur-[120px] rounded-full animate-pulse-slow"></div>

        <div class="max-w-4xl w-full text-center relative z-10">
            <a href="index.html" class="inline-block group mb-12">
                <div class="w-24 h-24 bg-indigo-600 rounded-[2rem] flex items-center justify-center shadow-2xl shadow-indigo-600/40 group-hover:scale-110 group-hover:rotate-12 transition-all duration-500">
                    <i class="fa-solid fa-shuttle-space text-white text-5xl"></i>
                </div>
             
            </a>

            <h2 class="text-4xl md:text-7xl font-black mb-6 tracking-tight">
                Something <span class="text-indigo-600">Legendary</span> is Landing.
            </h2>
            <p class="text-lg md:text-xl text-slate-500 dark:text-slate-400 mb-12 max-w-2xl mx-auto leading-relaxed">
                We are recalibrating our telescopes for a new era of space exploration. Join the waitlist to be the first to touch the stars.
            </p>

            <div class="max-w-md mx-auto mb-16">
                <form class="flex flex-col sm:flex-row gap-3">
                    <input type="email" placeholder="Enter your email" class="flex-grow p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 outline-none focus:ring-2 focus:ring-indigo-500 transition-all shadow-sm">
                    <button class="px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-xl shadow-indigo-600/20 transition-all active:scale-95 whitespace-nowrap">
                        Notify Me
                    </button>
                </form>
            </div>

            <div class="flex justify-center gap-8">
                <a href="#" class="text-slate-400 hover:text-indigo-600 transition-colors text-2xl"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" class="text-slate-400 hover:text-indigo-600 transition-colors text-2xl"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#" class="text-slate-400 hover:text-indigo-600 transition-colors text-2xl"><i class="fa-brands fa-discord"></i></a>
            </div>
        </div>
    </main>

    <footer class="p-8 text-center text-slate-400 text-xs uppercase tracking-widest">
        &copy; 2026 Stellaris Observatory. All Systems Operational.
    </footer>

    <script>
        const root = document.documentElement;

        // --- 1. THEME LOGIC ---
        const updateTheme = (isDark) => {
            root.classList.toggle('dark', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            const themeIcon = document.getElementById('theme-icon');
            if (themeIcon) {
                themeIcon.className = isDark ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
            }
        };

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            updateTheme(true);
        } else {
            updateTheme(false);
        }

        document.querySelectorAll('#theme-toggle, #theme-toggle-m').forEach(btn => {
            btn.onclick = () => updateTheme(!root.classList.contains('dark'));
        });

        // --- 2. DIRECTION LOGIC ---
        const updateDirection = (dir) => {
            root.dir = dir;
            localStorage.setItem('dir', dir);
            document.querySelectorAll('#dir-toggle, #dir-toggle-m').forEach(btn => {
                btn.innerHTML = dir === 'rtl' ? '<i class="fa-solid fa-language"></i> RTL' : '<i class="fa-solid fa-language"></i> LTR';
            });
        };

        const savedDir = localStorage.getItem('dir') || 'ltr';
        updateDirection(savedDir);

        document.querySelectorAll('#dir-toggle, #dir-toggle-m').forEach(btn => {
            btn.onclick = () => updateDirection(root.dir === 'rtl' ? 'ltr' : 'rtl');
        });
    </script>
</body>
</html>
